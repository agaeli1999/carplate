<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Norclip - Öz Dizaynını Yarat</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Əsas Şəkil və Konstruktor Sahəsi */
        .preview {
            position: relative;
            width: 100%;
            max-width: 800px; /* Şəklin ölçüsünə görə tənzimləmə */
            margin-bottom: 20px;
        }

        /* Sənin yüklədiyin Norclip şəkli */
        .bg-img {
            width: 100%;
            display: block;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        
        /* Mətn və Loqo Yerləşimi - Norclip ramkasının aşağı zolağı üçün */
        .overlay {
            position: absolute;
            bottom: 44.5%; /* Şəkildəki qara zolağın tam üstü */
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            pointer-events: none;
        }

        #main-text {
            flex-grow: 1;
            text-align: center;
            font-size: 2vw; /* Ekran ölçüsünə görə avtomatik böyüyür */
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .logo-box { width: 2.5vw; height: 2.5vw; display: flex; align-items: center; justify-content: center; }
        .logo-box img { max-width: 100%; max-height: 100%; filter: brightness(0) invert(1); } /* Loqonu ağ rəngə boyayır */

        /* Panel */
        .panel { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .inp-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 95%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        
        .order-btn { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .order-btn:hover { background: #1ebe57; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 30px;">Norclip Nömrə Qabı Konstruktoru</h2>

    <div class="preview">
        <img src="https://raw.githubusercontent.com/agaeli1999/carplate/main/ramka-Norclip.jpg" class="bg-img" alt="Norclip Frame">
        
        <div class="overlay">
            <div id="l-logo" class="logo-box"></div>
            <div id="main-text">MƏTN BURADA</div>
            <div id="r-logo" class="logo-box"></div>
        </div>
    </div>

    <div class="panel">
        <div class="inp-group">
            <label>1. Yazını yaz:</label>
            <input type="text" id="inp-text" placeholder="Məs: AD SOYAD" oninput="draw()">
        </div>

        <div class="inp-group">
            <label>2. Loqo üçün marka adını yaz (ingiliscə):</label>
            <input type="text" id="inp-logo" placeholder="Məs: BMW, Mercedes, Nike, Apple" oninput="draw()">
            <p style="font-size: 12px; color: #777; margin-top: 5px;">*Axtardığınız markanın adını düzgün yazın.</p>
        </div>

        <button class="order-btn" onclick="order()">WhatsApp ilə Sifariş</button>
    </div>

    <script>
        function draw() {
            const text = document.getElementById('inp-text').value;
            // Marka adını boşluqsuz və balaca hərflərlə təmizləyir
            const logo = document.getElementById('inp-logo').value.trim().toLowerCase().replace(/ /g, "");
            
            document.getElementById('main-text').innerText = text || "MƏTN BURADA";
            
            if(logo) {
                // Simple Icons-dan loqonu çəkir
                const url = `https://cdn.simpleicons.org/${logo}`;
                // Əgər loqo tapılmazsa, onerror işə düşür və şəkli gizlədir
                const img = `<img src="${url}" onerror="this.parentElement.style.display='none'" onload="this.parentElement.style.display='flex'">`;
                document.getElementById('l-logo').innerHTML = img;
                document.getElementById('r-logo').innerHTML = img;
            } else {
                // Əgər loqo adı yazılmayıbsa, boşluqları təmizlə
                document.getElementById('l-logo').innerHTML = "";
                document.getElementById('r-logo').innerHTML = "";
            }
        }

        function order() {
            const text = document.getElementById('inp-text').value;
            const logo = document.getElementById('inp-logo').value;
            
            if(!text && !logo) {
                alert("Zəhmət olmasa mətn və ya loqo daxil edin!");
                return;
            }

            const phone = "99450XXXXXXX"; // Öz nömrəni bura yaz
            const msg = `Yeni Nömrə Qabı Sifarişi:%0A📝 Mətn: ${text || 'Yoxdur'}%0A🏎️ Loqo: ${logo || 'Yoxdur'}`;
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>

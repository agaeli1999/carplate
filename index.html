<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>Norclip - Avtomat Loqo Sistemi</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .preview { position: relative; width: 100%; max-width: 700px; margin-bottom: 20px; }
        .bg-img { width: 100%; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .overlay {
            position: absolute; bottom: 44.5%; left: 50%;
            transform: translateX(-50%); width: 75%;
            display: flex; justify-content: space-between; align-items: center; color: white;
        }
        #main-text { flex-grow: 1; text-align: center; font-size: 1.8vw; font-weight: bold; text-transform: uppercase; }
        .logo-box { width: 3vw; height: 3vw; display: flex; align-items: center; justify-content: center; }
        .logo-box img { max-width: 100%; max-height: 100%; filter: brightness(0) invert(1); }

        .panel { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 95%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        .order-btn { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="preview">
        <img src="https://raw.githubusercontent.com/agaeli1999/carplate/main/ramka-Norclip.jpg" class="bg-img">
        <div class="overlay">
            <div id="l-logo" class="logo-box"></div>
            <div id="main-text">MƏTN BURADA</div>
            <div id="r-logo" class="logo-box"></div>
        </div>
    </div>

    <div class="panel">
        <label><b>1. Yazını yaz:</b></label>
        <input type="text" id="inp-text" placeholder="Məs: ELVIN 010" oninput="draw()">

        <label><b>2. Marka adını yaz (Loqo üçün):</b></label>
        <input type="text" id="inp-logo" placeholder="Məs: BMW, Mercedes, TikTok" oninput="draw()">
        <p style="font-size: 12px; color: #777;">*İstənilən dünya markasını ingiliscə yazın, loqo gələcək.</p>

        <button class="order-btn" onclick="order()">WhatsApp ilə Sifariş</button>
    </div>

    <script>
        function draw() {
            const text = document.getElementById('inp-text').value;
            const logo = document.getElementById('inp-logo').value.toLowerCase().replace(" ", "");
            
            document.getElementById('main-text').innerText = text || "MƏTN BURADA";
            
            if(logo) {
                const url = `https://cdn.simpleicons.org/${logo}`;
                const img = `<img src="${url}" onerror="this.style.display='none'">`;
                document.getElementById('l-logo').innerHTML = img;
                document.getElementById('r-logo').innerHTML = img;
            }
        }

        function order() {
            const text = document.getElementById('inp-text').value;
            const logo = document.getElementById('inp-logo').value;
            const phone = "99450XXXXXXX"; // Öz nömrəni bura yaz
            const msg = `Yeni Sifariş:%0A📝 Mətn: ${text}%0A🏎️ Loqo: ${logo}`;
            window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
        }
    </script>
</body>
</html>
